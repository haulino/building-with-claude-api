name: Lint

on:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install ruff
        run: pip install ruff==0.15.9

      - name: Lint check
        run: ruff check .

      - name: Format check
        run: ruff format --check .
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Install pytest
        run: pip install pytest==9.0.3
      
      - name: Unit testing
        run: pytest
